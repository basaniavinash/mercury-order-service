spring:
  application:
    name: mercury-order-service

  datasource:
    username: order_service
    password: orderpass
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    user: flyway_user
    password: flywaypass
    schemas: mercury
    default-schema: mercury
    table: flyway_orders_history
    baseline-on-migrate: true
    # IMPORTANT: orders should only see orders migrations
    locations: classpath:db/migration/orders

logging:
  level:
    root: INFO
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: INFO
    com.zaxxer.hikari: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}